<!DOCTYPE html>
<html>
    <head>
        <title>My calculator</title>
        <style>
         body {
            background:rgb(175, 117, 117);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }
        input {
            width:220px;
            height:60px;
            font-size:30px;
            text-align:right;
            margin-bottom:10px;
            border-radius:10px;
        }
        button {
            width:100px;
            height:50px;
            font-size:20px;
            margin:5px;
            border-radius:10px;
            border:none;
            background:pink;
            color:white;
            cursor:pointer;
        }
        button:hover {
            background: purple;
        }
        </style>
    </head>
    <body>
    <h1>My calculator</h1>
    <div>
        <input type="text" id="display" readonly>
    </div>
    <div>
        <button onclick="show('1')">1</button>
        <button onclick="show('2')">2</button>
        <button onclick="show('3')">3</button>
        <button onclick="show('*')">*</button>
    </div>
    <div>
        <button onclick="show('4')">4</button>
        <button onclick="show('5')">5</button>
        <button onclick="show('6')">6</button>
        <button onclick="show('+')">+</button>
    </div>
    <div>
        <button onclick="show('7')">7</button>
        <button onclick="show('8')">8</button>
        <button onclick="show('9')">9</button>
        <button onclick="show('/')">/</button>
    </div>
    <div>
        <button onclick="show('.')">.</button>
        <button onclick="show('0')">0</button>
        <button onclick="calculate()">=</button>
        <button onclick="show('-')">-</button>
    </div>

    <script>
        function show(num){
            document.getElementById("display").value+=num;
        }
        function calculate() {
            let x= document.getElementById("display").value;
            let y= eval(x);
            document.getElementById("display").value=y;
        }
    </script>

</body>
</html>
